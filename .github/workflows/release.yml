  publish:
    name: Publish Zed Extension
    runs-on: ubuntu-latest
    #needs:
    #  - build-lsp-server
    steps:
      - id: checkout
        name: Checkout rep0
        uses: actions/checkout@v7

      - id: publishem
        name: Publish to zed-industries/extensions
        uses: huacnlee/zed-extension-action@v2
        with:
          # NOTE: this **must** match the `id` field in `extension.toml`
          extension-name: regex-linter-lsp
          create-pullrequest: false # TODO: for testing the update itself first
          push-to: GottemHams/extensions
